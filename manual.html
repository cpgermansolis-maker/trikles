<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAC — Manual de Usuario</title>
<!-- Sistema OAC: tokens + fuentes -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="oac-tokens.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font-sans);
  background:#fff;color:var(--ink);
  min-height:100vh;-webkit-font-smoothing:antialiased;
}

/* ══ TOPBAR ══ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:64px;
  background:#fff;
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 rgba(14,42,78,.04);
  position:sticky;top:0;z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:11px;}
.topbar-logo{width:42px;height:23px;}
.topbar-name{
  font-family:var(--font-sans);
  font-size:18px;font-weight:600;letter-spacing:-.02em;
  color:var(--ink);line-height:1.02;text-transform:none;
}
.topbar-sub{
  font-family:var(--font-mono);
  font-size:9px;letter-spacing:.16em;
  color:var(--muted);text-transform:uppercase;margin-top:3px;
}
.btn-back{
  background:transparent;border:1px solid var(--line);color:var(--ink);
  padding:8px 14px;border-radius:var(--r-lg);
  font-family:var(--font-sans);font-size:13px;font-weight:500;
  letter-spacing:-.005em;text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;
  transition:all var(--t-fast);
}
.btn-back:hover{background:var(--paper);border-color:var(--navy);color:var(--navy);}
.btn-out{
  background:transparent;border:1px solid var(--line);color:var(--muted);
  padding:8px 14px;border-radius:var(--r-lg);
  font-family:var(--font-sans);font-size:13px;font-weight:500;
  cursor:pointer;transition:all var(--t-fast);
}
.btn-out:hover{border-color:var(--bad);color:var(--bad);}

/* ══ LAYOUT ══ */
.main{max-width:1100px;margin:0 auto;padding:32px 24px 48px;}
.manual-header{text-align:center;margin-bottom:36px;}
.manual-title{
  font-family:var(--font-sans);
  font-size:34px;font-weight:600;letter-spacing:-.02em;
  color:var(--ink);margin-bottom:10px;text-transform:none;line-height:1.1;
}
.manual-title .em{
  font-family:var(--font-serif);
  font-style:italic;font-weight:400;color:var(--navy);
}
.manual-sub{
  font-family:var(--font-sans);
  font-size:14.5px;color:var(--muted);
}
.rol-badge{
  display:inline-block;
  background:var(--paper);
  border:1px solid var(--line);
  color:var(--ink);
  padding:6px 16px;border-radius:999px;
  font-family:var(--font-sans);font-size:12.5px;font-weight:500;
  letter-spacing:-.005em;
  margin-top:14px;
}

/* ══ Sección colapsable (vista guía) ══ */
.seccion{
  background:#fff;border:1px solid var(--line);
  border-radius:var(--r-2xl);margin-bottom:14px;overflow:hidden;
  box-shadow:0 1px 2px rgba(14,42,78,.04);
  transition:border-color var(--t-fast);
}
.seccion:hover{border-color:var(--mist);}
.sec-head{
  display:flex;align-items:center;gap:12px;
  padding:18px 22px;cursor:pointer;
  transition:background var(--t-fast);
}
.sec-head:hover{background:var(--paper);}
.sec-icon{
  width:38px;height:38px;border-radius:var(--r-md);
  background:rgba(14,42,78,.08);color:var(--navy);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.sec-titulo{
  font-family:var(--font-sans);
  font-size:15.5px;font-weight:600;letter-spacing:-.005em;
  color:var(--ink);flex:1;text-transform:none;
}
.sec-arrow{color:var(--muted);font-size:14px;transition:transform .2s;}
.sec-arrow.open{transform:rotate(180deg);}
.sec-body{
  display:none;
  padding:0 22px 22px;
  border-top:1px solid var(--line);
  background:var(--paper);
}
.sec-body.open{display:block;}
.sec-body p{
  font-family:var(--font-sans);
  font-size:14px;line-height:1.75;color:var(--ink);
  margin-top:16px;white-space:pre-line;
}

/* ══ Search bar ══ */
.search-bar{
  background:#fff;border:1px solid var(--line);
  border-radius:var(--r-md);
  padding:11px 16px;
  display:flex;align-items:center;gap:10px;
  margin-bottom:24px;
  transition:border-color var(--t-fast),box-shadow var(--t-fast);
}
.search-bar:focus-within{border-color:var(--navy);box-shadow:0 0 0 3px rgba(14,42,78,.08);}
.search-bar input{
  background:none;border:none;
  color:var(--ink);
  font-family:var(--font-sans);font-size:14px;font-weight:500;
  width:100%;outline:none;
}
.search-bar input::placeholder{color:var(--muted);}
.search-bar > span:first-child{color:var(--muted);}

.no-results{
  font-family:var(--font-sans);
  text-align:center;padding:32px;color:var(--muted);
}

/* ══ Animación de vista ══ */
.view{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.btn-back-view{
  background:transparent;border:1px solid var(--line);color:var(--ink);
  padding:9px 18px;border-radius:var(--r-lg);
  font-family:var(--font-sans);font-size:13px;font-weight:500;
  letter-spacing:-.005em;cursor:pointer;
  margin-bottom:24px;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
  transition:all var(--t-fast);
}
.btn-back-view:hover{background:var(--paper);color:var(--navy);border-color:var(--navy);}

/* ══ Landing (2 tarjetas grandes) ══ */
.landing-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:32px;
}
.landing-card{
  border:1px solid var(--line);
  border-radius:var(--r-3xl);
  padding:48px 32px;
  text-align:center;cursor:pointer;
  font-family:var(--font-sans);color:var(--ink);
  background:#fff;
  box-shadow:0 1px 2px rgba(14,42,78,.04);
  display:flex;flex-direction:column;align-items:center;gap:14px;
  position:relative;overflow:hidden;
  transition:all var(--t-fast);
}
.landing-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  border-top-left-radius:var(--r-3xl);border-top-right-radius:var(--r-3xl);
  background:linear-gradient(90deg,var(--navy),var(--sky));
}
.landing-card:hover{
  transform:translateY(-4px);
  border-color:var(--navy);
  box-shadow:var(--shadow-card-hover);
}
.guia-card  {background:#fff;}
.curso-landing-card{background:linear-gradient(135deg,#fff 0%,var(--paper) 100%);}
.curso-landing-card::before{background:linear-gradient(90deg,var(--purple),var(--accent));}

.landing-icon{font-size:64px;line-height:1;}
.landing-title{
  font-family:var(--font-sans);
  font-size:24px;font-weight:600;letter-spacing:-.02em;
  color:var(--navy);text-transform:none;
}
.curso-landing-card .landing-title{color:var(--purple);}
.landing-sub{
  font-family:var(--font-sans);
  font-size:14px;color:var(--muted);line-height:1.6;max-width:340px;
}
.landing-cta{
  margin-top:14px;padding:11px 22px;
  background:transparent;
  border:1px solid var(--navy);color:var(--navy);
  border-radius:var(--r-md);
  font-family:var(--font-sans);font-weight:600;font-size:13px;
  letter-spacing:-.005em;
  transition:all var(--t-fast);
}
.curso-landing-card .landing-cta{border-color:var(--purple);color:var(--purple);}
.landing-card:hover .landing-cta{background:var(--navy);color:#fff;}
.curso-landing-card:hover .landing-cta{background:var(--purple);color:#fff;}

/* ══ Grid de cursos ══ */
.cursos-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
  gap:18px;margin-top:28px;
}
.curso-card-big{
  background:#fff;border:1px solid var(--line);
  border-radius:var(--r-2xl);
  overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
  font-family:var(--font-sans);color:var(--ink);
  text-align:left;padding:0;
  box-shadow:0 1px 2px rgba(14,42,78,.04);
  transition:all var(--t-fast);
}
.curso-card-big:hover{
  transform:translateY(-4px);
  border-color:var(--c,var(--navy));
  box-shadow:0 14px 32px -16px color-mix(in srgb,var(--c,var(--navy)) 35%,transparent);
}
.curso-hero{
  background:linear-gradient(135deg,var(--c) 0%,var(--c2) 100%);
  padding:38px 20px 28px;
  text-align:center;position:relative;overflow:hidden;
}
.curso-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;
  background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%);
  pointer-events:none;
}
.curso-hero::after{
  content:attr(data-bg);
  position:absolute;bottom:-20px;right:-10px;
  font-size:100px;opacity:.1;pointer-events:none;line-height:1;
}
.curso-emoji{
  font-size:64px;line-height:1;
  filter:drop-shadow(0 6px 14px rgba(14,42,78,.25));
  position:relative;
}
.curso-num{
  position:absolute;top:12px;left:14px;
  background:rgba(255,255,255,.85);color:var(--ink);
  padding:5px 11px;border-radius:999px;
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  letter-spacing:.14em;backdrop-filter:blur(4px);
}
.curso-body{
  padding:18px 20px 0;flex:1;
  display:flex;flex-direction:column;gap:8px;
}
.curso-meta{display:flex;gap:6px;flex-wrap:wrap;}
.curso-badge{
  background:var(--paper);color:var(--muted);
  border:1px solid var(--line);
  padding:3px 10px;border-radius:999px;
  font-family:var(--font-mono);font-size:10px;font-weight:500;letter-spacing:.04em;
}
.curso-titulo{
  font-family:var(--font-sans);
  font-size:18px;font-weight:600;letter-spacing:-.01em;
  color:var(--ink);line-height:1.2;text-transform:none;
}
.curso-sub{
  font-family:var(--font-sans);
  font-size:13px;color:var(--muted);line-height:1.55;flex:1;
}
.curso-cta{
  background:var(--paper);
  border-top:1px solid var(--line);
  padding:14px 18px;text-align:center;
  font-family:var(--font-sans);
  font-size:12.5px;font-weight:600;
  letter-spacing:-.005em;
  color:var(--c,var(--navy));margin-top:14px;
}

/* ══ Detalle de curso ══ */
.curso-detalle-hero{
  background:linear-gradient(135deg,var(--c) 0%,color-mix(in srgb,var(--c) 65%,#000) 100%);
  padding:50px 30px 44px;
  border-radius:var(--r-3xl);
  text-align:center;margin-bottom:24px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-feature);
}
.curso-detalle-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 15% 15%,rgba(255,255,255,.2),transparent 60%),
             radial-gradient(circle at 85% 85%,rgba(255,255,255,.1),transparent 55%);
  pointer-events:none;
}
.curso-detalle-emoji{
  font-size:84px;line-height:1;margin-bottom:18px;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.35));
  position:relative;
}
.curso-detalle-titulo{
  font-family:var(--font-sans);
  font-size:34px;font-weight:600;letter-spacing:-.02em;
  color:#fff;position:relative;line-height:1.1;text-transform:none;
}
.curso-detalle-sub{
  font-family:var(--font-sans);
  font-size:15px;color:rgba(255,255,255,.92);
  max-width:580px;margin:12px auto 0;
  position:relative;line-height:1.55;
}
.curso-detalle-meta{
  display:flex;justify-content:center;gap:10px;
  margin-top:18px;position:relative;
}
.curso-detalle-meta .curso-badge{
  background:rgba(255,255,255,.18);
  color:#fff;border-color:rgba(255,255,255,.25);
}

.curso-detalle-body{
  background:#fff;border:1px solid var(--line);
  border-radius:var(--r-3xl);padding:32px 30px;
  font-family:var(--font-sans);
  font-size:15px;line-height:1.75;color:var(--ink);
  white-space:pre-line;
  box-shadow:0 1px 2px rgba(14,42,78,.04);
}

.curso-nav{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:24px;gap:12px;
}
.btn-curso{
  padding:11px 22px;border-radius:var(--r-md);
  font-family:var(--font-sans);
  font-size:13px;font-weight:600;letter-spacing:-.005em;
  cursor:pointer;transition:all var(--t-fast);
}
.btn-curso-prev{
  background:transparent;color:var(--ink);
  border:1px solid var(--line);
}
.btn-curso-prev:hover{background:var(--paper);border-color:var(--navy);color:var(--navy);}
.btn-curso-next{background:var(--navy);color:#fff;border:none;}
.btn-curso-next:hover{background:var(--navy-2);transform:translateY(-1px);}

/* ══ Botón "Leer en voz alta" ══ */
.curso-detalle-actions{
  display:flex;justify-content:center;gap:10px;
  margin:-14px 0 22px;position:relative;z-index:2;
}
.btn-tts{
  background:rgba(255,255,255,.95);
  color:var(--ink);
  border:1px solid var(--line);
  padding:11px 22px;border-radius:var(--r-md);
  font-family:var(--font-sans);
  font-size:13px;font-weight:600;letter-spacing:-.005em;
  cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  transition:all var(--t-fast);
  backdrop-filter:blur(6px);
  box-shadow:0 4px 12px -4px rgba(14,42,78,.25);
}
.btn-tts:hover{background:#fff;border-color:var(--navy);color:var(--navy);}
.btn-tts.playing{
  background:rgba(159,43,30,.92);
  border-color:var(--bad);
  color:#fff;
  animation:ttsPulse 1.6s ease-in-out infinite;
}
@keyframes ttsPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(159,43,30,.55);}
  50%    {box-shadow:0 0 0 10px rgba(159,43,30,0);}
}

/* ══ Video complementario ══ */
.curso-video-box{
  margin-top:26px;
  background:#fff;border:1px solid var(--line);
  border-radius:var(--r-2xl);padding:22px;
  box-shadow:0 1px 2px rgba(14,42,78,.04);
}
.curso-video-title{
  font-family:var(--font-sans);
  font-size:16px;font-weight:600;letter-spacing:-.01em;
  color:var(--navy);margin-bottom:14px;text-transform:none;
}
.curso-video-wrap{
  position:relative;width:100%;
  padding-bottom:56.25%;height:0;
  border-radius:var(--r-md);overflow:hidden;
  background:#000;
}
.curso-video-wrap iframe{
  position:absolute;top:0;left:0;
  width:100%;height:100%;border:0;
}
.curso-video-pending{opacity:.7;border-style:dashed;}

/* Scrollbar */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--paper);}
::-webkit-scrollbar-thumb{background:var(--mist);border-radius:999px;border:2px solid var(--paper);}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ══ Responsive ══ */
@media(max-width:768px){
  .topbar{padding:0 12px;height:54px;}
  .topbar-logo{width:32px;height:18px;}
  .topbar-name{font-size:15px;letter-spacing:-.01em;}
  .topbar-sub{font-size:8px;letter-spacing:.14em;}
  .main{padding:22px 14px 32px;}
  .manual-title{font-size:26px;}
  .landing-grid{grid-template-columns:1fr;gap:14px;}
  .landing-card{padding:36px 22px;}
  .landing-icon{font-size:54px;}
  .landing-title{font-size:20px;}
  .cursos-grid{grid-template-columns:1fr;}
  .curso-detalle-hero{padding:38px 20px 32px;}
  .curso-detalle-titulo{font-size:24px;}
  .curso-detalle-emoji{font-size:64px;}
  .curso-detalle-body{padding:22px 18px;font-size:14px;}
  .curso-hero{padding:32px 16px 22px;}
  .curso-emoji{font-size:54px;}
}
@media(max-width:600px){
  .main{padding:18px 14px 28px;}
}
</style>

<body>

<!-- Defs SVG — Logo OAC -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="oac-mark" viewBox="0 0 400 220">
      <g style="mix-blend-mode:multiply">
        <circle cx="110" cy="110" r="90" fill="#9FCDE6" opacity=".95"/>
        <polygon points="200,20 290,200 110,200" fill="#D8DDE1" opacity=".85"/>
        <path d="M220 20 a90 90 0 0 1 0 180 L290 200 L290 20 Z" fill="#0E2A4E" opacity=".92"/>
      </g>
    </symbol>
  </defs>
</svg>

<header class="topbar">
  <div class="topbar-left">
    <svg class="topbar-logo" id="topbar-logo" viewBox="0 0 400 220" aria-label="OAC"><use href="#oac-mark"/></svg>
    <div>
      <div class="topbar-name" id="topbar-name"></div>
      <div class="topbar-sub">📖 MANUAL DE USUARIO</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <a id="btnBack" href="dashboard.html" class="btn-back">← Regresar</a>
    <button class="btn-out" onclick="logout()">Salir ✕</button>
  </div>
</header>

<main class="main">

  <!-- ══ VIEW 1: LANDING — elige guía o cursos ══ -->
  <div id="view-landing" class="view">
    <div class="manual-header">
      <div class="manual-title">📖 Manual OAC</div>
      <div class="manual-sub">Elige lo que quieres aprender hoy</div>
      <div class="rol-badge" id="rol-badge">Cargando...</div>
    </div>

    <div class="landing-grid">
      <button class="landing-card guia-card" onclick="showView('guia')">
        <div class="landing-icon">📖</div>
        <div class="landing-title">GUÍA DE USUARIO</div>
        <div class="landing-sub">Aprende a usar el sistema paso a paso, adaptado a tu rol.</div>
        <div class="landing-cta">Abrir la guía →</div>
      </button>
      <button class="landing-card curso-landing-card" onclick="showView('cursos')">
        <div class="landing-icon">🎓</div>
        <div class="landing-title">MINI CURSOS</div>
        <div class="landing-sub">Domina los conceptos clave de tu negocio: Punto de Equilibrio, Costos, Flujo, Reserva y más.</div>
        <div class="landing-cta">Ver cursos →</div>
      </button>
    </div>
  </div>

  <!-- ══ VIEW 2: GUÍA — manual por rol ══ -->
  <div id="view-guia" class="view" style="display:none">
    <button class="btn-back-view" onclick="showView('landing')">← Regresar al inicio del Manual</button>

    <div class="manual-header">
      <div class="manual-title">📖 Guía de Usuario</div>
      <div class="manual-sub">Guía de uso del sistema OAC por perfil</div>
      <div class="rol-badge" id="rol-badge-guia">—</div>
    </div>

    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar en la guía..." oninput="filtrar(this.value)">
    </div>

    <div id="secciones"></div>
  </div>

  <!-- ══ VIEW 3: CURSOS GRID — 5 cápsulas ══ -->
  <div id="view-cursos" class="view" style="display:none">
    <button class="btn-back-view" onclick="showView('landing')">← Regresar al inicio del Manual</button>

    <div class="manual-header">
      <div class="manual-title">🎓 Mini Cursos</div>
      <div class="manual-sub">5 cápsulas breves para dominar los conceptos esenciales</div>
    </div>

    <div class="cursos-grid" id="cursosGrid"></div>
  </div>

  <!-- ══ VIEW 4: CURSO DETALLE ══ -->
  <div id="view-curso" class="view" style="display:none">
    <button class="btn-back-view" onclick="showView('cursos')">← Volver a todos los cursos</button>
    <div id="cursoDetalle"></div>
  </div>

</main>

<script>

function getSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY+'_remember'));
    if (s && s.expires > Date.now()) return s;
    return null;
  } catch { return null; }
}

function logout() {
  if(confirm('¿Cerrar sesión?')) {
    sessionStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_KEY+'_remember');
    window.location.href = 'acceso.html';
  }
}

function jsonp(params, timeout=10000) {
  return new Promise((resolve,reject) => {
    const cb = '_cb'+Date.now()+Math.random().toString(36).slice(2);
    const s  = document.createElement('script');
    let done = false;
    const fin = (fn,v) => { if(done)return; done=true; delete window[cb]; s.remove(); fn(v); };
    window[cb] = d => fin(resolve,d);
    s.onerror  = () => fin(reject,new Error('error'));
    s.src = API + '?' + new URLSearchParams({...params, callback:cb});
    document.head.appendChild(s);
    setTimeout(() => fin(reject,new Error('timeout')), timeout);
  });
}

  // Guardar secciones para búsqueda (solo las del rol; los cursos viven aparte)
  secciones_data = manual.secciones;
  renderSecciones(secciones_data);
  renderCursosGrid();

  // Botón regresar según rol
  const backBtn = document.getElementById('btnBack');
  if (['ANALISTA_FIN','ANALISTA_FULL'].includes(s.rol)) backBtn.href = 'registro.html';
  else if (['ANALISTA_NOM'].includes(s.rol)) backBtn.href = 'nomina.html';
  else backBtn.href = 'dashboard.html';
});

// ════════════════════════════════════════════════════════════
// ══   NAVEGACIÓN DE VISTAS (landing, guía, cursos, detalle)  ══
// ════════════════════════════════════════════════════════════

function showView(name) {
  // Detener lectura en voz alta al cambiar de vista
  stopTTS();
  ['landing','guia','cursos','curso'].forEach(v => {
    const el = document.getElementById('view-' + v);
    if (el) el.style.display = (v === name) ? 'block' : 'none';
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── TTS (leer en voz alta) ──
let ttsActive = false;

function cleanTextForTTS(text) {
  // Quita emojis, guiones decorativos y compacta espacios para que la voz suene natural
  return text
    .replace(/[\u{1F300}-\u{1FAFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[─━–—]/g, ',')
    .replace(/\n{2,}/g, '. ')
    .replace(/\n/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function toggleTTS(idx) {
  const synth = window.speechSynthesis;
  if (!synth) {
    alert('Tu navegador no soporta la lectura en voz alta.');
    return;
  }
  if (ttsActive) { stopTTS(); return; }

  const c = CURSOS[idx];
  if (!c) return;
  const texto = c.titulo + '. ' + c.subtitulo + '. ' + cleanTextForTTS(c.contenido);
  const u = new SpeechSynthesisUtterance(texto);
  u.lang = 'es-MX';
  u.rate = 1;
  u.pitch = 1;
  u.onend   = () => { ttsActive = false; updateTTSButton(); };
  u.onerror = () => { ttsActive = false; updateTTSButton(); };
  synth.speak(u);
  ttsActive = true;
  updateTTSButton();
}

function stopTTS() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  ttsActive = false;
  updateTTSButton();
}

function updateTTSButton() {
  const btn = document.getElementById('btnTTS');
  if (!btn) return;
  btn.innerHTML = ttsActive ? '⏹ Detener lectura' : '🔊 Leer en voz alta';
  btn.classList.toggle('playing', ttsActive);
}

// ── YouTube: convertir cualquier URL a ID embebible ──
function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function renderCursosGrid() {
  const el = document.getElementById('cursosGrid');
  if (!el) return;
  el.innerHTML = CURSOS.map((c, i) => `
    <button class="curso-card-big" style="--c:${c.color};--c2:${c.color2}" onclick="openCurso(${i})">
      <div class="curso-hero" data-bg="${c.patron || c.icono}">
        <div class="curso-num">CURSO ${String(c.id).padStart(2,'0')}</div>
        <div class="curso-emoji">${c.icono}</div>
      </div>
      <div class="curso-body">
        <div class="curso-meta">
          <span class="curso-badge">📘 ${c.nivel}</span>
          <span class="curso-badge">⏱ ${c.duracion}</span>
        </div>
        <div class="curso-titulo">${c.titulo}</div>
        <div class="curso-sub">${c.subtitulo}</div>
      </div>
      <div class="curso-cta">EMPEZAR CURSO →</div>
    </button>
  `).join('');
}

function openCurso(idx) {
  const c = CURSOS[idx];
  if (!c) return;
  stopTTS(); // detener cualquier lectura previa al cambiar de curso
  const prev = idx > 0 ? idx - 1 : null;
  const next = idx < CURSOS.length - 1 ? idx + 1 : null;

  const ytId = getYouTubeId(c.video);
  const videoHTML = ytId
    ? `<div class="curso-video-box">
         <div class="curso-video-title">🎥 Video complementario</div>
         <div class="curso-video-wrap">
           <iframe src="https://www.youtube.com/embed/${ytId}" title="Video del curso ${c.titulo}" allowfullscreen loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
         </div>
       </div>`
    : `<div class="curso-video-box curso-video-pending">
         <div class="curso-video-title">🎥 Video complementario</div>
         <div style="font-size:13px;color:#888;text-align:center;padding:24px 12px">Video próximamente.</div>
       </div>`;

  const el = document.getElementById('cursoDetalle');
  el.innerHTML = `
    <div class="curso-detalle-hero" style="--c:${c.color}">
      <div class="curso-detalle-emoji">${c.icono}</div>
      <div class="curso-detalle-titulo">${c.titulo}</div>
      <div class="curso-detalle-sub">${c.subtitulo}</div>
      <div class="curso-detalle-meta">
        <span class="curso-badge">📘 ${c.nivel}</span>
        <span class="curso-badge">⏱ ${c.duracion}</span>
        <span class="curso-badge">Curso ${c.id} de ${CURSOS.length}</span>
      </div>
    </div>

    <div class="curso-detalle-actions">
      <button id="btnTTS" class="btn-tts" onclick="toggleTTS(${idx})">🔊 Leer en voz alta</button>
    </div>

    <div class="curso-detalle-body">${c.contenido}</div>

    ${videoHTML}

    <div class="curso-nav">
      ${prev !== null
        ? `<button class="btn-curso btn-curso-prev" onclick="openCurso(${prev})">← ${CURSOS[prev].titulo}</button>`
        : '<span></span>'}
      ${next !== null
        ? `<button class="btn-curso btn-curso-next" onclick="openCurso(${next})">${CURSOS[next].titulo} →</button>`
        : `<button class="btn-curso btn-curso-next" onclick="showView('cursos')">✓ Terminar</button>`}
    </div>
  `;
  showView('curso');
}

function renderSecciones(secs) {
  const el = document.getElementById('secciones');
  if (!secs.length) {
    el.innerHTML = '<div class="no-results">No se encontraron resultados.</div>';
    return;
  }
  el.innerHTML = secs.map((sec, i) => `
    <div class="seccion">
      <div class="sec-head" onclick="toggleSec(${i})">
        <div class="sec-icon">${sec.icono}</div>
        <div class="sec-titulo">${sec.titulo}</div>
        <span class="sec-arrow" id="arr_${i}">▼</span>
      </div>
      <div class="sec-body" id="body_${i}">
        <p>${sec.contenido}</p>
      </div>
    </div>
  `).join('');

  // Abrir primera sección por default
  toggleSec(0);
}

function toggleSec(i) {
  const body = document.getElementById('body_'+i);
  const arr  = document.getElementById('arr_'+i);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arr.classList.toggle('open', !isOpen);
}

function filtrar(q) {
  if (!q.trim()) { renderSecciones(secciones_data); return; }
  const term = q.toLowerCase();
  const filtered = secciones_data.filter(s =>
    s.titulo.toLowerCase().includes(term) ||
    s.contenido.toLowerCase().includes(term)
  );
  renderSecciones(filtered);
  // Abrir todas cuando hay búsqueda
  filtered.forEach((_, i) => {
    const body = document.getElementById('body_'+i);
    const arr  = document.getElementById('arr_'+i);
    if (body) body.classList.add('open');
    if (arr)  arr.classList.add('open');
  });
}
</script>
