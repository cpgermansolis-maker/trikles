  .area-row{font-size:13px;margin:3px 0}

  .pill{display:inline-block;font-size:10.5px;padding:1px 7px;background:var(--paper);border:1px solid var(--line);white-space:nowrap;margin:1px 2px 1px 0}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);padding:11px 20px;font-size:13.5px;opacity:0;pointer-events:none;transition:all .25s;z-index:200;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.error{background:var(--ember-deep)}
  @media(max-width:640px){ .page-head h1{font-size:28px} .resumen .big{font-size:26px} .toggle-wrap{margin-left:0} }
</style>

<script>
(function(){
  'use strict';
  var API_URL = 'https://script.google.com/macros/s/AKfycbwYbhG9xyML1p7Yp3Il54f9wCN6qTXFSc696IVnpQ8IIxE2YGhKpbTP5gLe-tGkyXA/exec';

  function getQuery(name){ var m=(location.search.match(new RegExp('[?&]'+name+'=([^&]*)'))||[])[1]; return m?decodeURIComponent(m):''; }
  var token = getQuery('t') || '<?!= __tokenInyectado ?>';
  var user, empresa, sucursales;
  if (token) { try { sessionStorage.setItem('fogueira_token', token); } catch(e){} }
  if (!token) { try { token = sessionStorage.getItem('fogueira_token'); } catch(e){} }
  if (!token) { (function(){var _o=document.createElement('div');_o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#f6f1e8;color:#0c0907;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:system-ui,-apple-system,sans-serif';_o.innerHTML='<div style="max-width:420px"><div style="font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a8278;margin-bottom:10px">Sesión expirada</div><h2 style="font-size:23px;margin:0 0 10px;font-weight:600">Tu sesión expiró</h2><p style="color:#5d6c80;font-size:14px;margin:0 0 20px;line-height:1.5">Por seguridad, la sesión se renueva cada día. Vuelve a iniciar sesión para continuar.</p><a href="'+API_URL+'?p=acceso" target="_top" style="display:inline-block;background:#0c0907;color:#c89a4a;padding:13px 24px;text-decoration:none;font-weight:600">Iniciar sesión</a></div>';document.body.appendChild(_o);})(); return; }
  try {
    user = JSON.parse(sessionStorage.getItem('fogueira_user') || 'null');
    empresa = JSON.parse(sessionStorage.getItem('fogueira_empresa') || 'null');
    sucursales = JSON.parse(sessionStorage.getItem('fogueira_sucursales') || '[]');
  } catch(e){}

  var AUDIT_ROLES = ['admin','auditoria','gerente_administrativo','gerente_restaurante','gerente_plaza'];
  var rol = '', ultimaData = null;
  var _sesionUIAplicada = false;

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }
  function toast(msg,tipo){ var t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(tipo==='error'?' error':''); setTimeout(function(){ t.classList.remove('show'); }, 2400); }

  // Fechas locales (NUNCA toISOString)
  function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function ayerISO(){ var d=new Date(); d.setDate(d.getDate()-1); return ymd(d); }
  function parseISO(s){ var p=String(s||'').split('-'); return new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10)); }
  function moverDias(iso, n){ var d=parseISO(iso); d.setDate(d.getDate()+n); return ymd(d); }
  function fechaBonita(iso){
    try{ var d=parseISO(iso); var dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
      var mes=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      return dias[d.getDay()]+' '+d.getDate()+' de '+mes[d.getMonth()]; }catch(e){ return iso; }
  }
  function areaCap(a){ return ({cajera:'Cajera',cocina:'Cocina',churrasca:'Churrasca',barra:'Barra',cava:'Cava',panaderia:'Panadería',compras:'Compras',host:'Host'})[a]||a; }
  function sevIcon(sev){ return sev==='critica'?'🔴':(sev==='alta'?'🟠':'🟡'); }

  // ---------- API JSONP + carga robusta ----------
  function apiCall(params, cb){
    var cbName='_jcb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
    var s=document.createElement('script');
    var cleanup=function(){ try{delete window[cbName];}catch(e){window[cbName]=undefined;} if(s.parentNode)s.parentNode.removeChild(s); };
    var t=setTimeout(function(){ cleanup(); cb({ok:false,error:'timeout'}); }, 25000);
    window[cbName]=function(d){ clearTimeout(t); cleanup(); cb(d); };
    var qs=Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    s.onerror=function(){ clearTimeout(t); cleanup(); cb({ok:false,error:'network'}); };
    s.src=API_URL+'?'+qs+'&callback='+cbName; document.body.appendChild(s);
  }
  function _esErrTransitorio(res){ if(!res)return true; if(res.ok)return false; var e=String(res.error||'').toLowerCase(); return e==='network'||e.indexOf('timeout')!==-1; }
  function apiCallReintento(params, cb, intentos){
    intentos=(intentos==null)?2:intentos;
    apiCall(params, function(res){
      if(res&&res.ok){ cb(res); return; }
      if(intentos>0&&_esErrTransitorio(res)){ setTimeout(function(){ apiCallReintento(params,cb,intentos-1); },1200); return; }
      cb(res);
    });
  }
  function _errorBox(target, msg, onRetry){
    var el=document.getElementById(target); if(!el)return;
    el.innerHTML='';
    var box=document.createElement('div'); box.className='empty-state';
    var p=document.createElement('div'); p.textContent=msg||'No se pudo cargar.'; p.style.marginBottom='12px';
    var b=document.createElement('button'); b.type='button'; b.className='btn'; b.textContent='↻ Reintentar';
    b.onclick=function(){ el.innerHTML='<div class="empty-state">Cargando…</div>'; onRetry(); };
    box.appendChild(p); box.appendChild(b); el.appendChild(box);
  }

  // ---------- Sesión / UI ----------
  function urlInicio(){ return API_URL+'?p=inicio&t='+encodeURIComponent(token||'')+(user?'&urol='+encodeURIComponent(user.rol||'')+'&unom='+encodeURIComponent(user.nombre||user.email||''):''); }

  function aplicarSesionUI(){
    if(_sesionUIAplicada) return true;
    _sesionUIAplicada=true;
    rol=String((user&&user.rol)||'').trim().toLowerCase();
    if(AUDIT_ROLES.indexOf(rol)===-1){
      alert('Tu rol no tiene acceso al reporte de auditoría matutina.');
      (function(_u){var _o=document.createElement('div');_o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#f6f1e8;color:#0c0907;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:system-ui,-apple-system,sans-serif';_o.innerHTML='<div style="max-width:420px"><div style="font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a8278;margin-bottom:10px">Sin acceso</div><h2 style="font-size:23px;margin:0 0 10px;font-weight:600">Esta pantalla no es para tu rol</h2><p style="color:#5d6c80;font-size:14px;margin:0 0 20px;line-height:1.5">Toca el botón de abajo para ir a tu inicio, donde verás las pantallas que sí puedes usar.</p><a href="'+_u+'" target="_top" style="display:inline-block;background:#0c0907;color:#c89a4a;padding:13px 24px;text-decoration:none;font-weight:600">← Ir a mi inicio</a></div>';document.body.appendChild(_o);})(urlInicio());
      return false;
    }
    document.getElementById('empresaNombre').textContent=(empresa&&empresa.nombre)||'—';
    document.getElementById('btnInicio').href=urlInicio();
    // Branding dinámico (solo sobrescribe si hay empresa_config)
    (function(){ if(!token)return; var cb='_brand_'+Date.now(); window[cb]=function(d){ try{delete window[cb];}catch(e){} if(!d||!d.ok||!d.branding||d.origen!=='empresa_config')return; var b=d.branding,rs=document.documentElement.style; if(b.color_primario)rs.setProperty('--gold',b.color_primario); if(b.color_secundario)rs.setProperty('--ink',b.color_secundario); if(b.color_acento)rs.setProperty('--ember',b.color_acento); if(b.color_fondo)rs.setProperty('--cream',b.color_fondo); if(b.nombre_comercial)document.querySelectorAll('.brand .wordmark').forEach(function(w){ w.textContent=String(b.nombre_comercial).toUpperCase(); }); }; var s=document.createElement('script'); s.src=API_URL+'?action=empresa_branding_get&token='+encodeURIComponent(token)+'&callback='+cb; s.async=true; document.head.appendChild(s); })();
    return true;
  }

  // ---------- Render ----------
  function sucActiva(){ return (sucursales && sucursales[0] && sucursales[0].id) || ''; }

  function copiarMensaje(txt, btn){
    var ok=function(){ toast('Copiado ✓'); if(btn){ var o=btn.textContent; btn.textContent='✓ Copiado'; setTimeout(function(){ btn.textContent=o; },1600); } };
    var fail=function(){ toast('No se pudo copiar. Selecciónalo a mano.','error'); };
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(txt).then(ok, function(){ legacyCopiar(txt)?ok():fail(); });
      } else { legacyCopiar(txt)?ok():fail(); }
    }catch(e){ legacyCopiar(txt)?ok():fail(); }
  }
  function legacyCopiar(txt){
    try{ var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); var ok=document.execCommand('copy'); document.body.removeChild(ta); return ok; }catch(e){ return false; }
  }

  function renderPersonas(){
    var d=ultimaData; if(!d) return;
    var soloPend=document.getElementById('soloPend').checked;
    var wrap=document.getElementById('personasWrap');
    var personas=d.personas||[];
    if(!personas.length){
      wrap.innerHTML='<div class="empty-state">No hay pendientes que mostrar para esta fecha (o falta configurar la Agenda).</div>';
      return;
    }
    // Ordenar: con pendientes primero, luego al día.
    var lista=personas.slice().sort(function(a,b){ return (a.ok?1:0)-(b.ok?1:0); });
    if(soloPend) lista=lista.filter(function(p){ return !p.ok; });
    if(!lista.length){
      wrap.innerHTML='<div class="empty-state">Todos al día ✅ — nadie tiene pendientes en esta fecha. Desactiva «solo con pendientes» para ver el detalle.</div>';
      return;
    }
    wrap.innerHTML=lista.map(function(p, i){
      var head='<div class="persona-head"><div><span class="persona-nom">'+esc(p.usuario_nombre||p.usuario_email)+'</span>'
        +'<span class="persona-area">'+esc(areaCap(p.area))+'</span></div>';
      if(p.ok){
        head+='<span class="ok-txt">✅ al día</span></div>';
        return '<div class="persona ok">'+head+'</div>';
      }
      head+='<button class="btn btn-primary btn-sm" type="button" data-copy="'+i+'">📋 Copiar mensaje</button></div>';
      var pend='<ul class="pend-list">'+(p.pendientes||[]).map(function(x){
        return '<li><span class="ic">'+sevIcon(x.sev)+'</span><span>'+esc(x.titulo)+'</span></li>';
      }).join('')+'</ul>';
      return '<div class="persona">'+head+pend+'</div>';
    }).join('');
    // Wire copy buttons (data-copy = índice en `lista`)
    wrap.querySelectorAll('[data-copy]').forEach(function(b){
      b.addEventListener('click', function(){
        var p=lista[parseInt(b.getAttribute('data-copy'),10)];
        if(p) copiarMensaje(String(p.mensaje_texto||''), b);
      });
    });
  }

  function renderAreas(){
    var d=ultimaData; if(!d) return;
    var areas=d.areas||[];
    var wrap=document.getElementById('areasWrap');
    var body=document.getElementById('areasBody');
    if(!areas.length){ wrap.style.display='none'; return; }
    wrap.style.display='block';
    body.innerHTML=areas.map(function(a){
      var rows='';
      rows+='<div class="area-row"><span class="k">Esperados activos</span>'+( (a.esperados_activos&&a.esperados_activos.length)
        ? a.esperados_activos.map(function(n){ return '<span class="pill">'+esc(n)+'</span>'; }).join('')
        : '<span class="pill">'+(a.sin_agenda?'sin agenda configurada':'nadie')+'</span>' )+'</div>';
      if(a.descansan && a.descansan.length){
        rows+='<div class="area-row"><span class="k">Descansan</span>'+a.descansan.map(function(n){ return '<span class="pill">'+esc(n)+'</span>'; }).join('')+'</div>';
      }
      rows+='<div class="area-row"><span class="k">Quién operó</span>'+( (a.operaron&&a.operaron.length)
        ? a.operaron.map(function(n){ return '<span class="pill green">'+esc(n)+'</span>'; }).join('')
        : '<span class="pill">nadie</span>' )+'</div>';
      if(a.area==='cajera' && a.conciliacion){
        var c=a.conciliacion;
        var estado = c.existe ? (esc(c.estado)||'abierta') : 'no se abrió';
        var ecls = (c.existe && c.estado==='cerrada') ? 'green' : 'red';
        rows+='<div class="area-row"><span class="k">Corte de caja</span><span class="pill '+ecls+'">'+estado+'</span>';
        if(c.banderas_rojas>0) rows+='<span class="pill red">'+c.banderas_rojas+' bandera'+(c.banderas_rojas===1?'':'s')+' roja'+(c.banderas_rojas===1?'':'s')+'</span>';
        rows+='</div>';
      }
      return '<div class="area-block"><h3>'+esc(areaCap(a.area))+(a.sin_agenda?' · ⚠️ sin agenda':'')+'</h3>'+rows+'</div>';
    }).join('');
  }

  function renderResumen(){
    var d=ultimaData; if(!d) return;
    var r=d.resumen||{};
    var box=document.getElementById('resumen');
    box.style.display='flex';
    var con=r.con_pendientes||0, tot=r.total_personas||0;
    if(con===0){
      box.className='resumen allgood';
      document.getElementById('resBig').textContent='✓';
      document.getElementById('resTxt').textContent=(tot>0?('Las '+tot+' personas evaluadas están al día — '):'Sin personas evaluadas — ')+fechaBonita(d.fecha)+'.';
    } else {
      box.className='resumen';
      document.getElementById('resBig').textContent=con+' de '+tot;
      document.getElementById('resTxt').textContent='persona'+(con===1?'':'s')+' con pendientes · '+fechaBonita(d.fecha)+'.';
    }
    // Aviso de áreas sin agenda
    var avisoBox=document.getElementById('avisoBox');
    var sinAg=r.sin_agenda_areas||[];
    if(sinAg.length){
      var nombres=sinAg.map(areaCap).join(', ');
      avisoBox.innerHTML='<div class="alert warn">⚠️ Estas áreas no tienen agenda configurada ('+esc(nombres)+'). '
        +'Sin agenda no se puede atribuir el pendiente a una persona. '
        +'<a href="'+escAttr(API_URL+'?p=agenda&t='+encodeURIComponent(token||''))+'" target="_top">Configurar la Agenda →</a></div>';
    } else { avisoBox.innerHTML=''; }
  }

  // ---------- Cargar ----------
  function fechaSel(){ return document.getElementById('fFecha').value || ayerISO(); }
  function cargar(){
    document.getElementById('errBox').innerHTML='';
    document.getElementById('personasWrap').innerHTML='<div class="empty-state">Cargando…</div>';
    document.getElementById('resumen').style.display='none';
    document.getElementById('areasWrap').style.display='none';
    document.getElementById('avisoBox').innerHTML='';
    apiCallReintento({ action:'auditoria_matutina', token:token, fecha:fechaSel(), sucursal_id:sucActiva() }, function(res){
      if(!res||!res.ok){
        _errorBox('personasWrap', (res&&res.error&&!_esErrTransitorio(res))?res.error:'No se pudo cargar el reporte. Revisa tu internet.', cargar);
        return;
      }
      ultimaData=res;
      // Sincronizar el selector con la fecha que devolvió el backend (default = ayer)
      if(res.fecha) document.getElementById('fFecha').value=res.fecha;
      renderResumen();
      renderPersonas();
      renderAreas();
    });
  }

  // ---------- Wiring (DOMContentLoaded) ----------
  function wire(){
    document.getElementById('btnLogout').addEventListener('click', function(){
      if(!confirm('¿Cerrar sesión?')) return;
      try{ sessionStorage.clear(); }catch(e){}
      (function(){var _o=document.createElement('div');_o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#f6f1e8;color:#0c0907;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:system-ui,-apple-system,sans-serif';_o.innerHTML='<div style="max-width:420px"><div style="font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a8278;margin-bottom:10px">Sesión expirada</div><h2 style="font-size:23px;margin:0 0 10px;font-weight:600">Tu sesión expiró</h2><p style="color:#5d6c80;font-size:14px;margin:0 0 20px;line-height:1.5">Por seguridad, la sesión se renueva cada día. Vuelve a iniciar sesión para continuar.</p><a href="'+API_URL+'?p=acceso" target="_top" style="display:inline-block;background:#0c0907;color:#c89a4a;padding:13px 24px;text-decoration:none;font-weight:600">Iniciar sesión</a></div>';document.body.appendChild(_o);})();
    });
    document.getElementById('fFecha').addEventListener('change', cargar);
    document.getElementById('navPrev').addEventListener('click', function(){ document.getElementById('fFecha').value=moverDias(fechaSel(),-1); cargar(); });
    document.getElementById('navNext').addEventListener('click', function(){ document.getElementById('fFecha').value=moverDias(fechaSel(), 1); cargar(); });
    document.getElementById('soloPend').addEventListener('change', renderPersonas);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', wire); else wire();

  // ---------- Init (resiliente: un parpadeo no tira la sesión) ----------
  function iniciar(){
    apiCallReintento({ action:'me', token:token }, function(res){
      if(!res||!res.ok){
        if(_esErrTransitorio(res)){
          _errorBox('personasWrap','No se pudo conectar con el servidor. Tu sesión sigue activa.', iniciar);
          return;
        }
        try{ sessionStorage.clear(); }catch(e){}
        alert('Tu sesión expiró.');
        (function(){var _o=document.createElement('div');_o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#f6f1e8;color:#0c0907;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:system-ui,-apple-system,sans-serif';_o.innerHTML='<div style="max-width:420px"><div style="font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a8278;margin-bottom:10px">Sesión expirada</div><h2 style="font-size:23px;margin:0 0 10px;font-weight:600">Tu sesión expiró</h2><p style="color:#5d6c80;font-size:14px;margin:0 0 20px;line-height:1.5">Por seguridad, la sesión se renueva cada día. Vuelve a iniciar sesión para continuar.</p><a href="'+API_URL+'?p=acceso" target="_top" style="display:inline-block;background:#0c0907;color:#c89a4a;padding:13px 24px;text-decoration:none;font-weight:600">Iniciar sesión</a></div>';document.body.appendChild(_o);})();
        return;
      }
      user=res.user||user; empresa=res.empresa||empresa||null; sucursales=res.sucursales||sucursales||[];
      try{
        sessionStorage.setItem('fogueira_token',token);
        sessionStorage.setItem('fogueira_user',JSON.stringify(user));
        sessionStorage.setItem('fogueira_empresa',JSON.stringify(empresa));
        sessionStorage.setItem('fogueira_sucursales',JSON.stringify(sucursales||[]));
      }catch(e){}
      if(!aplicarSesionUI()) return;
      // Default del selector = ayer (el backend ya usa ayer si no mando fecha, pero mostramos algo de entrada)
      if(!document.getElementById('fFecha').value) document.getElementById('fFecha').value=ayerISO();
      cargar();
    });
  }
  iniciar();
})();
</script>
</body>
</html>
