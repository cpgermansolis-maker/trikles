  // ---------- API JSONP ----------
  function apiCall(params, cb){
    var cbName = '_jcb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    var script = document.createElement('script');
    var cleanup = function(){ try{ delete window[cbName];}catch(e){window[cbName]=undefined;} if(script.parentNode) script.parentNode.removeChild(script); };
    var t = setTimeout(function(){ cleanup(); cb({ok:false,error:'timeout'}); }, 30000);
    window[cbName] = function(d){ clearTimeout(t); cleanup(); cb(d); };
    var qs = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
    script.onerror = function(){ clearTimeout(t); cleanup(); cb({ok:false,error:'network'}); };
    script.src = API_URL + '?' + qs + '&callback=' + cbName;
    document.body.appendChild(script);
  }

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtNum(n){
    if (n == null || n === 0) return '—';
    var num = Number(n);
    if (isNaN(num)) return '—';
    return num.toLocaleString('es-MX', { maximumFractionDigits: 3 });
  }

  // Toast
  var toastTimer = null;
  function toast(msg, type){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2000);
  }

  // Semanas ISO
  function isoWeek(date){
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    var dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    var weekNum = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
    return d.getUTCFullYear() + '-W' + String(weekNum).padStart(2, '0');
  }
  function semanaAdyacente(semana, delta){
    var m = semana.match(/^(\d{4})-W(\d{2})$/);
    var year = Number(m[1]), week = Number(m[2]) + delta;
    while (week < 1) { year--; week += 52; }
    while (week > 53) { year++; week -= 52; }
    return year + '-W' + String(week).padStart(2, '0');
  }

  var state = {
    semana: isoWeek(new Date()),
    grid: [],

  document.getElementById('btnNext').addEventListener('click', function(){

    cargarSemana();
  });

  function cargarSemana(){
    document.getElementById('semanaLbl').textContent = state.semana;
    document.getElementById('contenido').innerHTML = '<div class="empty-state">Cargando…</div>';
    document.getElementById('btnNuevaSemana').style.display = 'none';
    apiCall({ action:'inv_churrasca_get_semana', token: token, semana_iso: state.semana }, function(res){
      if (!res.ok) {
        document.getElementById('contenido').innerHTML = '<div class="empty-state" style="color:var(--bad)">' + esc(res.error || 'Error') + '</div>';
        return;
      }
      state.grid = res.grid;
      state.fechas = res.fechas;
      // Si la semana no tiene movimientos (todas las celdas en cero), ofrecer crear
      var algunaConDatos = res.grid.some(function(g){
        return g.dias.some(function(d){ return d.id !== null; });
      });
      if (!algunaConDatos && puedeEditar) {
        document.getElementById('btnNuevaSemana').style.display = '';
      }
      renderGrid();

  function renderGrid(){
    if (!state.grid.length) {
      document.getElementById('contenido').innerHTML = '<div class="empty-state">No hay configuración de inventario. Pídele al admin que configure los ingredientes a inventariar.</div>';
      document.getElementById('kpiRow').innerHTML = '';
      return;
    }
    // KPIs de la semana
    var totalEnt = 0, totalSal = 0, totalAlertas = 0, vinculados = 0, sinVincNombres = [];
    var totalSug = 0, celdasSug = 0, weekHasRows = false;
    state.grid.forEach(function(g){
      totalEnt += g.total_entradas;
      totalSal += g.total_salidas;
      if (g.vinculado) vinculados++; else sinVincNombres.push(g.nombre);
      g.dias.forEach(function(d){
        if (d.alerta_consumo) totalAlertas++;
        if (d.id !== null) weekHasRows = true;
        // Casilla con sugerencia "por aplicar" = hay compras ese día y difieren de lo capturado.
        if (Number(d.entrada_sugerida) > 0 && Number(d.entrada_sugerida) !== Number(d.entrada)) {
          totalSug += Number(d.entrada_sugerida); celdasSug++;
        }
      });
    });
    var sinVinc = state.grid.length - vinculados;
    document.getElementById('kpiRow').innerHTML =
      '<div class="kpi"><div class="lbl">Ingredientes inventariar</div><div class="val">' + state.grid.length + '</div></div>' +
      '<div class="kpi' + (sinVinc > 0 ? ' alert' : '') + '"><div class="lbl">🔗 Vinculados al SR12</div><div class="val">' + vinculados + ' / ' + state.grid.length + '</div>' + (sinVinc > 0 ? '<div style="font-size:11px;color:var(--bad,#9a2b1e);margin-top:2px">' + sinVinc + ' sin clave (no se auto-llenan)</div>' : '<div style="font-size:11px;color:#1E7F5C;margin-top:2px">listos para auto-llenar entradas</div>') + '</div>' +
      (celdasSug > 0 ? '<div class="kpi" style="border-color:rgba(200,154,74,.55)"><div class="lbl">📥 Sugerido desde compras</div><div class="val" style="color:#8a6a1f">' + fmtNum(totalSug) + '</div><div style="font-size:11px;color:#8a6a1f;margin-top:2px">' + celdasSug + ' casilla(s) por aplicar</div></div>' : '') +
      '<div class="kpi"><div class="lbl">Total entradas semana</div><div class="val">' + fmtNum(totalEnt) + '</div></div>' +
      '<div class="kpi"><div class="lbl">Total salidas semana</div><div class="val">' + fmtNum(totalSal) + '</div></div>' +
      (totalAlertas > 0 ? '<div class="kpi alert"><div class="lbl">⚠ Alertas consumo</div><div class="val">' + totalAlertas + '</div></div>' : '');

    // Botón de auto-llenado: solo si puede editar, la semana ya está creada y hay sugerencias por aplicar.
    document.getElementById('btnAutollenar').style.display = (puedeEditar && weekHasRows && celdasSug > 0) ? '' : 'none';

    // Agrupar por sección
    var secciones = { 'Congelador': [], 'Bodega': [], 'Refrigerador': [] };
    state.grid.forEach(function(g){ if (secciones[g.seccion]) secciones[g.seccion].push(g); });

    var html = '';
    if (sinVincNombres.length) {
      html += '<div style="background:rgba(159,43,30,.10);border-left:3px solid #9a2b1e;padding:11px 14px;margin-bottom:14px;font-size:13px">'
        + '<strong style="color:#9a2b1e">⚠ Faltan ' + sinVincNombres.length + ' carne(s) por vincular su clave SR12.</strong> '
        + 'Lista para pasarle al comprador (las vincula en Recetas → Ingredientes):'
        + '<div style="margin-top:7px;font-family:\'DM Mono\',monospace;font-size:13px;color:var(--ink,#0c0907);line-height:1.7">' + sinVincNombres.map(function(n){ return '• ' + esc(n); }).join('<br>') + '</div>'
        + '</div>';
    }
    ['Congelador', 'Bodega', 'Refrigerador'].forEach(function(seccion){
      var items = secciones[seccion];
      if (!items.length) return;
      html += '<section class="seccion" data-seccion="' + seccion + '">' +
        '<div class="seccion-head" data-toggle="' + seccion + '">' +
          '<h2>' + seccion + '</h2>' +
          '<span class="conteo">' + items.length + ' ingredientes</span>' +
          '<span class="toggle">▼</span>' +
        '</div>' +
        '<div class="seccion-body">' +
          renderSeccionTabla(items) +
        '</div>' +
      '</section>';
    });
    document.getElementById('contenido').innerHTML = html;

    // Click en el chip de clave SR12 → abrir modal de vinculación (delegado, una sola vez).
    if (puedeVincular && !window._chipVincListener) {
      window._chipVincListener = true;
      document.getElementById('contenido').addEventListener('click', function(e){
        var chip = e.target.closest('[data-vincular]');
        if (!chip) return;
        openVincularModal(chip.getAttribute('data-vincular'), chip.getAttribute('data-nombre'), chip.getAttribute('data-clave'));
      });
    }

    // Toggle secciones
    document.querySelectorAll('.seccion-head').forEach(function(h){
      h.addEventListener('click', function(){
        var sec = h.parentElement;
        sec.classList.toggle('collapsed');
        h.querySelector('.toggle').textContent = sec.classList.contains('collapsed') ? '▶' : '▼';
      });
    });
    // Edición inline (ignora el clic sobre el chip de sugerencia, que tiene su propia acción)
    if (puedeEditar) {
      document.querySelectorAll('td.editable').forEach(function(td){
        td.addEventListener('click', function(e){
          if (e.target.closest('.sug-apply')) return;
          activarEdicion(td);
        });
      });
    }

    // Aplicar una sugerencia individual (toca el chip 📥 → pone esa entrada). Delegado, una sola vez.
    if (puedeEditar && !window._sugApplyListener) {
      window._sugApplyListener = true;
      document.getElementById('contenido').addEventListener('click', function(e){
        var chip = e.target.closest('.sug-apply');
        if (!chip) return;
        e.stopPropagation();
        aplicarSugerencia(chip.getAttribute('data-ing'), chip.getAttribute('data-fecha'), Number(chip.getAttribute('data-val')));
      });
    }
  }

  // Pone la entrada sugerida (de compras) en una celda concreta — reusa el guardado de celda.
  function aplicarSugerencia(ing, fecha, val){
    if (!ing || !fecha || !(val > 0)) return;
    apiCall({ action:'inv_churrasca_save_celda', token: token, ingrediente_id: ing, fecha: fecha, campo: 'entrada', valor: val }, function(res){
      if (res.ok) { toast('Entrada puesta desde compras: ' + fmtNum(val)); cargarSemana(); }
      else { toast(res.error || 'Error', 'error'); }
    });
  }

  // Chip con la clave SR12 y el semáforo de vinculación (el "puente" para auto-llenar entradas).
  // Si el usuario puede vincular, el chip es clickeable y abre el modal de vinculación AQUÍ MISMO.
  function claveTag(g){
    var style = "font-family:'DM Mono',monospace;font-size:10px;margin-top:3px;display:inline-block;padding:1px 6px";
    var dataAttrs = '';
    if (puedeVincular) {
      style += ';cursor:pointer';
      dataAttrs = ' data-vincular="' + esc(g.ingrediente_id) + '" data-nombre="' + esc(String(g.nombre||'')) + '" data-clave="' + esc(g.clave_sr12 || '') + '"';
    }
    if (g.vinculado) {
      var comp = g.n_compras > 0 ? (g.n_compras + ' compras') : 'sin compras aún';
      var tip = puedeVincular ? ('Vinculado a SR12 ' + esc(g.clave_sr12) + ' — toca para cambiar') : ('Vinculado al SR12 (clave ' + esc(g.clave_sr12) + ').');
      return '<div' + dataAttrs + ' style="' + style + ';background:rgba(30,127,92,.10);color:#1E7F5C" title="' + tip + '">🔗 SR12 ' + esc(g.clave_sr12) + ' · ' + comp + (puedeVincular ? ' ✎' : '') + '</div>';
    }
    var tipNo = puedeVincular ? 'Sin clave SR12 — toca para vincularlo ahora.' : 'Sin clave SR12: las compras de este insumo NO se podrán auto-llenar hasta vincularlo.';
    return '<div' + dataAttrs + ' style="' + style + ';background:rgba(159,43,30,.12);color:#9a2b1e" title="' + tipNo + '">⚠ sin clave SR12' + (puedeVincular ? ' · toca para vincular' : '') + '</div>';
  }

  // Chip de "entrada sugerida": lo que se compró ese día según el SR12.
  // Si el usuario edita, es clickeable (toca → pone ese valor en la entrada). Si no, es solo informativo.
  function sugChip(g, d){
    var v = Number(d.entrada_sugerida || 0);
    if (v <= 0 || v === Number(d.entrada || 0)) return ''; // sin compras o ya aplicado
    var lab = '📥 ' + fmtNum(v);
    if (puedeEditar && d.id) {
      return '<div class="sug-apply" data-ing="' + esc(g.ingrediente_id) + '" data-fecha="' + d.fecha + '" data-val="' + v + '" title="Comprado el ' + esc(d.fecha) + ' según el SR12: ' + fmtNum(v) + ' ' + esc(g.unidad) + '. Toca para ponerlo como entrada.">' + lab + '</div>';
    }
    return '<div class="sug-info" title="Comprado el ' + esc(d.fecha) + ' según el SR12: ' + fmtNum(v) + ' ' + esc(g.unidad) + '">' + lab + '</div>';
  }

  function renderSeccionTabla(items){
    var diasShort = ['L','M','X','J','V','S','D'];
    var diasFull = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
    var thHead1 = '<th class="col-ing" rowspan="2">Insumo</th>';
    var thHead2 = '';
    state.fechas.forEach(function(f, i){
      thHead1 += '<th colspan="4" class="dia-grupo" title="' + esc(f.fecha) + '">' + diasFull[i] + '<br>' + f.fecha.slice(5) + '</th>';
      thHead2 += '<th class="num">Inv</th><th class="num">Ent</th><th class="num">Sal</th><th class="num">Tot</th>';
    });
    thHead1 += '<th colspan="3" class="col-total-grupo">Total semana</th>';
    thHead2 += '<th class="num col-total-grupo">Ent</th><th class="num col-total-grupo">Sal</th><th class="num col-total-grupo">Inv final</th>';

    var rows = items.map(function(g){
      var celdas = '';
      g.dias.forEach(function(d){
        var celdaInv = (puedeEditar && d.id) ? '<td class="num editable" data-ing="' + g.ingrediente_id + '" data-fecha="' + d.fecha + '" data-campo="inv_inicial" data-actual="' + (d.inv_inicial || 0) + '">' + fmtNum(d.inv_inicial) + '</td>'
                       : '<td class="num">' + fmtNum(d.inv_inicial) + '</td>';
        var sug = sugChip(g, d);
        var celdaEnt = (puedeEditar && d.id) ? '<td class="num editable" data-ing="' + g.ingrediente_id + '" data-fecha="' + d.fecha + '" data-campo="entrada" data-actual="' + (d.entrada || 0) + '">' + fmtNum(d.entrada) + sug + '</td>'
                       : '<td class="num">' + fmtNum(d.entrada) + sug + '</td>';
        var salClass = d.alerta_consumo ? 'num editable alerta' : 'num editable';
        var celdaSal = (puedeEditar && d.id) ? '<td class="' + salClass + '" data-ing="' + g.ingrediente_id + '" data-fecha="' + d.fecha + '" data-campo="salida" data-actual="' + (d.salida || 0) + '" title="' + (d.alerta_consumo ? '⚠ Salida >20% del promedio histórico' : '') + '">' + fmtNum(d.salida) + (d.alerta_consumo ? ' ⚠' : '') + '</td>'
                       : '<td class="num">' + fmtNum(d.salida) + (d.alerta_consumo ? ' ⚠' : '') + '</td>';
        celdas += celdaInv + celdaEnt + celdaSal +
                  '<td class="num calc">' + fmtNum(d.inv_final) + '</td>';
      });
      celdas += '<td class="num col-total-grupo">' + fmtNum(g.total_entradas) + '</td>' +
                '<td class="num col-total-grupo">' + fmtNum(g.total_salidas) + '</td>' +
                '<td class="num col-total-grupo">' + fmtNum(g.inv_final_semana) + '</td>';
      return '<tr><td class="col-ing">' + esc(g.nombre) + ' <small style="color:var(--muted);font-weight:400">(' + esc(g.unidad) + ')</small>' + claveTag(g) + '</td>' + celdas + '</tr>';
    }).join('');

    return '<div class="tabla-wrap"><table class="inv">' +
      '<thead><tr>' + thHead1 + '</tr><tr>' + thHead2 + '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div>';
  }

  function activarEdicion(td) {
    var ing = td.getAttribute('data-ing');
    var fecha = td.getAttribute('data-fecha');
    var campo = td.getAttribute('data-campo');
    var actual = td.getAttribute('data-actual');
    var input = document.createElement('input');
    input.type = 'number';
    input.step = '0.001';
    input.min = '0';
    input.value = actual;
    var prev = td.innerHTML;
    td.innerHTML = '';
    td.appendChild(input);
    input.focus();
    input.select();
    var guardar = function(){
      var val = input.value;
      if (val === '' || val === actual) { td.innerHTML = prev; return; }
      td.innerHTML = '<span style="color:var(--muted);font-size:11px">…</span>';
      apiCall({ action:'inv_churrasca_save_celda', token: token, ingrediente_id: ing, fecha: fecha, campo: campo, valor: val }, function(res){
        if (res.ok) {
          if (res.alerta_consumo) toast('⚠ Consumo anómalo (>20% del promedio)', 'warn');
          else toast('Guardado');
          cargarSemana();
        } else {
          toast(res.error || 'Error', 'error');
          td.innerHTML = prev;
        }
      });
    };
    input.addEventListener('blur', guardar);
    input.addEventListener('keydown', function(e){
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { td.innerHTML = prev; }
    });
  }

    sessionStorage.clear();
    (function(){var _o=document.createElement('div');_o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#f6f1e8;color:#0c0907;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:system-ui,-apple-system,sans-serif';_o.innerHTML='<div style="max-width:420px"><div style="font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a8278;margin-bottom:10px">Sesión expirada</div><h2 style="font-size:23px;margin:0 0 10px;font-weight:600">Tu sesión expiró</h2><p style="color:#5d6c80;font-size:14px;margin:0 0 20px;line-height:1.5">Por seguridad, la sesión se renueva cada día. Vuelve a iniciar sesión para continuar.</p><a href="'+API_URL+'?p=acceso" target="_top" style="display:inline-block;background:#0c0907;color:#c89a4a;padding:13px 24px;text-decoration:none;font-weight:600">Iniciar sesión</a></div>';document.body.appendChild(_o);})();
  });

  apiCall({ action:'me', token: token }, function(res){
    if (!res.ok) {
      sessionStorage.clear(); alert('Tu sesión expiró.');
      (function(){var _o=document.createElement('div');_o.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#f6f1e8;color:#0c0907;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:system-ui,-apple-system,sans-serif';_o.innerHTML='<div style="max-width:420px"><div style="font-family:monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a8278;margin-bottom:10px">Sesión expirada</div><h2 style="font-size:23px;margin:0 0 10px;font-weight:600">Tu sesión expiró</h2><p style="color:#5d6c80;font-size:14px;margin:0 0 20px;line-height:1.5">Por seguridad, la sesión se renueva cada día. Vuelve a iniciar sesión para continuar.</p><a href="'+API_URL+'?p=acceso" target="_top" style="display:inline-block;background:#0c0907;color:#c89a4a;padding:13px 24px;text-decoration:none;font-weight:600">Iniciar sesión</a></div>';document.body.appendChild(_o);})();
      return;
    }
    if (res.user) { try { sessionStorage.setItem('fogueira_user', JSON.stringify(res.user)); user = res.user; } catch(e){} }
    if (res.empresa) { try { sessionStorage.setItem('fogueira_empresa', JSON.stringify(res.empresa)); empresa = res.empresa; } catch(e){} }
    if (!aplicarSesionUI()) return;
    cargarSemana();
  });

  // ===== Modal de vinculación SR12 (atajo desde el inventario) =====
  var VINC = { ingId:'', ingNombre:'', claveActual:'', seleccionada:'', catalogo:null, cargando:false };

  function scoreSimVinc(textoIng, textoSr12){
    var norm = function(s){ return String(s||'').toLowerCase()
      .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
      .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
      .replace(/[^a-z0-9 ]/g,' ').trim(); };
    var STOP = {'de':1,'la':1,'el':1,'y':1,'a':1,'en':1,'con':1,'para':1,'por':1,'sin':1,'kg':1,'lt':1,'pza':1,'pz':1,'gr':1,'ml':1,'x':1};
    var pi = norm(textoIng).split(/\s+/).filter(function(w){ return w.length >= 3 && !STOP[w]; });
    var ps = norm(textoSr12).split(/\s+/).filter(function(w){ return w.length >= 3 && !STOP[w]; });
    if (!pi.length || !ps.length) return 0;
    var c = 0;
    pi.forEach(function(w){
      if (ps.indexOf(w) !== -1) c++;
      else if (ps.some(function(s){ return s.indexOf(w) !== -1 || w.indexOf(s) !== -1; })) c += 0.5;
    });
    return c / Math.max(pi.length, ps.length);
  }

  function openVincularModal(ingId, ingNombre, claveActual){
    if (!puedeVincular) return;
    VINC.ingId = ingId; VINC.ingNombre = ingNombre || ''; VINC.claveActual = claveActual || ''; VINC.seleccionada = claveActual || '';
    document.getElementById('vincTitle').textContent = claveActual ? 'Cambiar vínculo SR12' : 'Vincular a una clave SR12';
    document.getElementById('vincSub').textContent = VINC.ingNombre + (claveActual ? (' · actual: ' + claveActual) : ' · sin vínculo');
    document.getElementById('vincBuscar').value = '';
    document.getElementById('vincDesvincular').style.display = claveActual ? '' : 'none';
    document.getElementById('vincConfirmar').disabled = true;
    document.getElementById('vincBackdrop').classList.add('open');
    if (!VINC.catalogo && !VINC.cargando) cargarCatalogoVinc();
    else renderCandidatosVinc();
    setTimeout(function(){ try { document.getElementById('vincBuscar').focus(); } catch(e){} }, 60);
  }
  function cerrarVinc(){ document.getElementById('vincBackdrop').classList.remove('open'); }

  function cargarCatalogoVinc(){
    VINC.cargando = true;
    document.getElementById('vincLista').innerHTML = '<div class="vinc-empty">Cargando catálogo SR12…<br><small>La primera vez puede tardar unos segundos.</small></div>';
    apiCall({ action:'sr12_catalogo_list', token: token }, function(res){
      VINC.cargando = false;
      if (!res || !res.ok) { document.getElementById('vincLista').innerHTML = '<div class="vinc-empty" style="color:#9a2b1e">No se pudo cargar el catálogo SR12.<br><small>' + esc((res&&res.error)||'Error') + '</small></div>'; return; }
      VINC.catalogo = res.productos || [];
      renderCandidatosVinc();
    });
  }

  function renderCandidatosVinc(){
    var cont = document.getElementById('vincLista');
    if (!VINC.catalogo) { cont.innerHTML = '<div class="vinc-empty">Cargando…</div>'; return; }
    var q = String(document.getElementById('vincBuscar').value || '').toLowerCase().trim();
    var res;
    if (q) {
      res = VINC.catalogo.filter(function(s){ return (String(s.clave_sr12||'')+' '+String(s.nombre_sr12||'')+' '+String(s.presentacion_descripcion||'')).toLowerCase().indexOf(q) !== -1; });
    } else {
      res = VINC.catalogo.map(function(s){ return { s:s, sc: scoreSimVinc(VINC.ingNombre, (s.nombre_sr12||'') + ' ' + (s.presentacion_descripcion||'')) }; })
        .sort(function(a,b){ return b.sc - a.sc; }).slice(0, 80).map(function(r){ return r.s; });
    }
    if (!res.length) { cont.innerHTML = '<div class="vinc-empty">Sin coincidencias para "<strong>' + esc(q) + '</strong>".<br><small>Prueba con menos palabras o el código exacto.</small></div>'; return; }
    var grupo = q ? (res.length + ' coincidencia' + (res.length === 1 ? '' : 's')) : 'Sugerencias por nombre (toca la correcta)';
    cont.innerHTML = '<div class="vinc-grupo">' + grupo + '</div>' + res.slice(0, 200).map(function(s){
      var esActual = String(s.clave_sr12) === VINC.claveActual;
      var esSel = String(s.clave_sr12) === VINC.seleccionada;
      var cls = 'vinc-row' + (esActual ? ' actual' : (esSel && !esActual ? ' selected' : ''));
      var total = Number(s.existencia_total || 0);
      var stock = total > 0 ? ('<strong>' + (total >= 10 ? total.toFixed(1) : total.toFixed(2)) + '</strong> ' + esc(s.unidad_base || '')) : '<span style="color:#999">sin stock</span>';
      var pres = (s.presentacion_descripcion && s.presentacion_descripcion !== s.nombre_sr12) ? s.presentacion_descripcion : '';
      return '<div class="' + cls + '" data-clave="' + esc(s.clave_sr12) + '">' +
        '<span class="clave">' + esc(s.clave_sr12) + '</span>' +
        '<div><div class="nombre">' + esc(s.nombre_sr12 || '—') + (esActual ? ' · actual' : '') + '</div>' + (pres ? '<div class="pres">' + esc(pres) + '</div>' : '') + '</div>' +
        '<div class="stock">' + stock + '</div></div>';
    }).join('');
    cont.querySelectorAll('.vinc-row').forEach(function(row){
      row.addEventListener('click', function(){
        cont.querySelectorAll('.vinc-row.selected').forEach(function(r){ r.classList.remove('selected'); });
        if (!row.classList.contains('actual')) row.classList.add('selected');
        VINC.seleccionada = row.getAttribute('data-clave');
        document.getElementById('vincConfirmar').disabled = (!VINC.seleccionada || VINC.seleccionada === VINC.claveActual);
      });
    });
  }

  function confirmarVinc(){
    if (!VINC.seleccionada || VINC.seleccionada === VINC.claveActual) return;
    var btn = document.getElementById('vincConfirmar');
    btn.disabled = true; btn.textContent = 'Vinculando…';
    apiCall({ action:'sr12_ingrediente_vincular', token: token, data: JSON.stringify({ ingrediente_id: VINC.ingId, clave_sr12: VINC.seleccionada }) }, function(res){
      btn.textContent = 'Vincular';
      if (!res || !res.ok) { btn.disabled = false; alert('No se pudo vincular: ' + ((res&&res.error) || 'error')); return; }
      cerrarVinc();
      toast('✓ Vinculado a SR12 ' + VINC.seleccionada);
      cargarSemana();
    });
  }

  function desvincularVinc(){
    if (!VINC.claveActual) return;
    if (!confirm('¿Quitar el vínculo SR12 de "' + VINC.ingNombre + '"? Volverá a aparecer sin clave.')) return;
    apiCall({ action:'sr12_ingrediente_vincular', token: token, data: JSON.stringify({ ingrediente_id: VINC.ingId, clave_sr12: '' }) }, function(res){
      if (!res || !res.ok) { alert('No se pudo desvincular: ' + ((res&&res.error) || 'error')); return; }
      cerrarVinc();
      toast('Vínculo quitado');
      cargarSemana();
    });
  }

  document.getElementById('vincClose').addEventListener('click', cerrarVinc);
  document.getElementById('vincCancelar').addEventListener('click', cerrarVinc);
  document.getElementById('vincConfirmar').addEventListener('click', confirmarVinc);
  document.getElementById('vincDesvincular').addEventListener('click', desvincularVinc);
  document.getElementById('vincBuscar').addEventListener('input', renderCandidatosVinc);
  document.getElementById('vincBackdrop').addEventListener('click', function(e){ if (e.target.id === 'vincBackdrop') cerrarVinc(); });

})();
</script>
