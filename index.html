<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>
<script>
// Registrar service worker para forzar siempre versión nueva
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    for (var r of registrations) { r.unregister(); }
  });
  navigator.serviceWorker.register('/trikles/sw.js').then(function(reg) {
    reg.update();
  });
}
// Redirigir con timestamp para romper caché
var v = new Date().getTime();
window.location.replace('landing.html?v=' + v);
</script>
</body>
</html>
